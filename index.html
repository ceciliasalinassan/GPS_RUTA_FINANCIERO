<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GPSRUTA Financiero Ultra Liviano</title>
<style>
:root{--bg:#020403;--card:rgba(0,0,0,.72);--neon:#7CFC00;--gold:#FFD43B;--cyan:#00ffd2;--red:#ff4d4d}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(124,252,0,.15),transparent 28%),radial-gradient(circle at 85% 20%,rgba(255,212,59,.12),transparent 25%),#020403;color:#fff;font-family:Arial,sans-serif}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:rgba(0,0,0,.86);border-right:1px solid rgba(124,252,0,.25);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.logo{color:var(--neon);font-weight:900;font-size:28px;text-align:center}.sub{color:var(--gold);font-size:11px;text-align:center;margin:6px 0 20px}
.nav button{display:block;width:100%;padding:12px;margin:6px 0;border:1px solid rgba(255,255,255,.1);background:transparent;color:#fff;border-radius:12px;text-align:left;cursor:pointer;font-weight:700}.nav button.active,.nav button:hover{background:rgba(124,252,0,.12);border-color:var(--neon)}
main{padding:18px;overflow:auto}.top{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.search{flex:1;min-width:220px}input,select,textarea{width:100%;padding:11px;border-radius:12px;border:1px solid rgba(0,255,210,.25);background:rgba(0,0,0,.55);color:#fff}textarea{min-height:90px}
button{padding:10px 13px;border-radius:12px;border:1px solid rgba(0,255,210,.28);background:rgba(0,255,210,.08);color:#fff;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--neon),#dfff65);color:#001;border:0}.danger{border-color:rgba(255,77,77,.4);color:#ff7777}.gold{background:linear-gradient(135deg,var(--gold),#b88900);color:#111;border:0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.card{background:linear-gradient(145deg,rgba(0,18,24,.82),rgba(0,0,0,.75));border:1px solid rgba(0,255,210,.22);border-radius:18px;padding:16px;box-shadow:0 16px 40px rgba(0,0,0,.35)}.card h2{margin:0 0 12px;color:var(--gold);font-size:20px}.kpi b{font-size:26px;color:var(--cyan);display:block}.kpi span{font-size:12px;color:#cde;text-transform:uppercase}.kpi.neg b{color:var(--red)}
.two{display:grid;grid-template-columns:360px 1fr;gap:14px}.form{position:sticky;top:12px;align-self:start}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.tableWrap{max-height:calc(100vh - 220px);overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.08)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left}th{position:sticky;top:0;background:#06100c;color:var(--gold);z-index:2}.actions{display:flex;gap:5px;flex-wrap:wrap}.pill{padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.15);font-size:11px}.vencida{color:var(--red);border-color:rgba(255,77,77,.4)}.pagada{color:var(--neon);border-color:rgba(124,252,0,.4)}.porvencer{color:var(--gold);border-color:rgba(255,212,59,.4)}
.alerts{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:12px 0}.alert{padding:14px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.12)}.alert b{font-size:22px;display:block}.alert.red b{color:var(--red)}.alert.yellow b{color:var(--gold)}.alert.green b{color:var(--neon)}.alert.cyan b{color:var(--cyan)}
.chat{position:fixed;right:18px;bottom:18px;width:360px;max-width:calc(100vw - 24px);z-index:10}.chatbox{background:rgba(0,0,0,.9);border:1px solid var(--gold);border-radius:18px;overflow:hidden}.chathead{padding:12px;color:var(--gold);border-bottom:1px solid rgba(255,212,59,.25)}.msgs{max-height:260px;overflow:auto;padding:10px}.msg{padding:8px 10px;border-radius:12px;margin:6px 0;white-space:pre-wrap;font-size:13px}.ia{background:rgba(0,255,210,.08)}.user{background:rgba(255,212,59,.12);text-align:right}.chatin{display:grid;grid-template-columns:1fr auto;gap:6px;padding:10px}
.hidden{display:none}.note{font-size:12px;color:#bde}.compactList{max-height:420px;overflow:auto}.task{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px;border:1px solid rgba(255,255,255,.1);border-radius:12px;margin:6px 0}.done{text-decoration:line-through;opacity:.55}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.alerts{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}.form{position:relative}.chat{position:relative;right:auto;bottom:auto;width:auto;margin:14px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="logo">GPSRUTA</div><div class="sub">FINANCIERO ULTRA LIVIANO</div><div class="nav" id="nav"></div><hr style="border-color:rgba(255,255,255,.1)"><button onclick="backup()">💾 Descargar respaldo</button><label style="display:block;margin-top:8px"><button style="width:100%">📥 Importar respaldo</button><input type="file" id="restore" accept=".json" style="display:none"></label></aside>
<main>
<div class="top"><input class="search" id="search" placeholder="Buscar cliente, factura, RUT..."><div id="clock"></div><button class="gold" onclick="save()">Guardar ahora</button></div>
<section id="view"></section>
</main>
</div>
<div class="chat"><button class="gold" onclick="toggleChat()">🤖 LUXURY GPSRUTA</button><div class="chatbox" id="chatbox"><div class="chathead"><b>LUXURY GPSRUTA</b><br><small>IA Financiera liviana</small></div><div class="msgs" id="msgs"><div class="msg ia">Hola, soy LUXURY GPSRUTA. Pregúntame: factura más antigua, quién debe más, resumen del mes, facturas vencidas o clientes premium.</div></div><div class="chatin"><input id="q" placeholder="Pregunta..."><button onclick="ask()">Enviar</button></div></div></div>
<script>
const KEY="gpsruta_static_v1";
const money=n=>"$"+Number(n||0).toLocaleString("es-CL");
const today=()=>new Date().toISOString().slice(0,10);
const mk=d=>String(d||today()).slice(5,7)+"/"+String(d||today()).slice(0,4);
const ml=m=>m==="Todas"?"TODAS":m;
const seed={clients:[{id:1,nombre:"Transportes del Sur SpA",rut:"76.543.210-9",giro:"Transporte",telefono:"56912345678",email:"cliente@demo.cl"}],invoices:[{id:1,clienteId:1,factura:"FAC-001",emision:today(),vencimiento:today(),monto:1250000,estado:"Pendiente",detalle:"Servicio GPS"}],incomes:[],expenses:[],debts:[],tasks:[],commitments:[],actions:[],goal:0};
let data=load(),tab="dashboard",search="";
function load(){try{return {...seed,...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch(e){return seed}}
function save(){localStorage.setItem(KEY,JSON.stringify(data));toast("Guardado correcto")}
function toast(t){alert(t)}
setInterval(()=>document.getElementById("clock").textContent=new Date().toLocaleString("es-CL",{hour12:false}),1000);
function client(id){return data.clients.find(c=>+c.id===+id)||{}}
function days(d){return Math.ceil((new Date(d)-new Date(today()))/86400000)}
function status(i){if(i.estado==="Pagada")return"Pagada";let d=days(i.vencimiento);if(d<0)return"Vencida";if(d<=15)return"Por vencer";return"Pendiente"}
function nav(){let items=[["dashboard","Dashboard"],["clients","Clientes"],["invoices","Facturas por cobrar"],["income","Ingresos"],["expenses","Egresos"],["debts","Deudas"],["alerts","Cobros / Recordatorios"],["commitments","Compromisos"],["tasks","Tareas"]];document.getElementById("nav").innerHTML=items.map(i=>`<button class="${tab===i[0]?'active':''}" onclick="tab='${i[0]}';render()">${i[1]}</button>`).join("")}
document.getElementById("search").oninput=e=>{search=e.target.value.toLowerCase();render()}
document.getElementById("restore").onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();render()};r.readAsText(f)}
function backup(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="respaldo_gpsruta.json";a.click()}
function render(){nav();({dashboard,clients,invoices,income,expenses,debts,alerts,commitments,tasks}[tab])()}
function kpis(){let ingresos=data.incomes.reduce((s,x)=>s+Number(x.monto),0),egresos=data.expenses.reduce((s,x)=>s+Number(x.monto),0),saldo=ingresos-egresos,venc=data.invoices.filter(i=>status(i)==="Vencida"),por=data.invoices.filter(i=>status(i)==="Por vencer"),porc=data.invoices.filter(i=>status(i)!=="Pagada").reduce((s,x)=>s+Number(x.monto),0);return{ingresos,egresos,saldo,venc,por,porc}}
function dashboard(){let k=kpis();let crit=critical();document.getElementById("view").innerHTML=`<div class="alerts"><div class="alert red"><b>${k.venc.length}</b>Vencidas</div><div class="alert yellow"><b>${k.por.length}</b>Por vencer</div><div class="alert green"><b>${money(k.porc)}</b>Por cobrar</div><div class="alert cyan"><b>${crit.filter(c=>c.pend>=4).length}</b>Alto riesgo</div><div class="alert green"><b>${crit.filter(c=>c.pend===0).length}</b>Premium</div><div class="alert yellow"><b>${data.tasks.filter(t=>!t.done).length}</b>Tareas</div></div><div class="grid"><div class="card kpi"><b>${money(k.ingresos)}</b><span>Ingresos</span></div><div class="card kpi"><b>${money(k.egresos)}</b><span>Egresos</span></div><div class="card kpi ${k.saldo<0?'neg':''}"><b>${money(k.saldo)}</b><span>Saldo neto</span></div><div class="card kpi"><b>${money(k.porc)}</b><span>Total por cobrar</span></div></div><div class="two"><div class="card"><h2>Ranking críticos</h2>${crit.slice(0,10).map(c=>`<p><b>${c.nombre}</b><br><span class="note">${c.pend} pendientes · ${money(c.monto)}</span></p>`).join("")||"Sin críticos"}</div><div class="card"><h2>Calendario de cobranza</h2>${data.invoices.filter(i=>status(i)!=="Pagada").sort((a,b)=>a.vencimiento.localeCompare(b.vencimiento)).slice(0,20).map(i=>`<p><span class="pill ${status(i).replace(" ","").toLowerCase()}">${status(i)}</span> ${i.vencimiento} · ${i.factura} · ${client(i.clienteId).nombre||""} · ${money(i.monto)}</p>`).join("")}</div></div>`}
function critical(){return data.clients.map(c=>{let inv=data.invoices.filter(i=>+i.clienteId===+c.id&&status(i)!=="Pagada");return{...c,pend:inv.length,monto:inv.reduce((s,x)=>s+Number(x.monto),0)}}).sort((a,b)=>b.monto-a.monto)}
function clients(){let rows=data.clients.filter(c=>(c.nombre+c.rut).toLowerCase().includes(search));document.getElementById("view").innerHTML=`<div class="two"><div class="card form"><h2>Cliente</h2><input id="cn" placeholder="Nombre / Razón social"><input id="cr" placeholder="RUT"><input id="cg" placeholder="Giro"><input id="ct" placeholder="Teléfono"><input id="ce" placeholder="Email"><button class="primary" onclick="addClient()">Guardar cliente</button></div><div class="card"><h2>Clientes</h2><div class="tableWrap"><table><tr><th>Nombre</th><th>RUT</th><th></th></tr>${rows.map(c=>`<tr><td>${c.nombre}</td><td>${c.rut}</td><td><button onclick="delClient(${c.id})">Eliminar</button></td></tr>`).join("")}</table></div></div></div>`}
function addClient(){let rut=cr.value.trim().replace(/\./g,"").replace(/-/g,"");if(data.clients.some(c=>c.rut.replace(/\./g,"").replace(/-/g,"")===rut))return alert("ERROR: RUT duplicado");data.clients.unshift({id:Date.now(),nombre:cn.value,rut:cr.value,giro:cg.value,telefono:ct.value,email:ce.value});save();clients()}
function delClient(id){if(confirm("Eliminar cliente?")){data.clients=data.clients.filter(c=>c.id!==id);save();clients()}}
function invoices(){let months=["Todas",...new Set(data.invoices.map(i=>mk(i.vencimiento)))];let m=localStorage.invMonth||"Todas", st=localStorage.invStatus||"Vencida";let rows=data.invoices.filter(i=>(m==="Todas"||mk(i.vencimiento)===m)&&(st==="Todas"||status(i)===st)&&(`${i.factura} ${client(i.clienteId).nombre||""}`).toLowerCase().includes(search));document.getElementById("view").innerHTML=`<div class="two"><div class="card form"><h2>Factura por cobrar</h2><select id="fc">${data.clients.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("")}</select><input id="ff" placeholder="N° Factura"><input id="fe" type="date" value="${today()}"><input id="fv" type="date" value="${today()}"><input id="fm" type="number" placeholder="Monto"><textarea id="fd" placeholder="Detalle"></textarea><button class="primary" onclick="addInvoice()">Guardar factura</button></div><div class="card"><h2>Listado de facturas por cobrar</h2><div class="row"><select onchange="localStorage.invMonth=this.value;invoices()">${months.map(x=>`<option ${x===m?'selected':''}>${x}</option>`)}</select><select onchange="localStorage.invStatus=this.value;invoices()"><option ${st==="Vencida"?'selected':''}>Vencida</option><option ${st==="Por vencer"?'selected':''}>Por vencer</option><option ${st==="Todas"?'selected':''}>Todas</option></select></div><p class="note">${rows.length} facturas encontradas</p><div class="tableWrap"><table><tr><th>Factura</th><th>Cliente</th><th>Vence</th><th>Monto</th><th>Estado</th><th></th></tr>${rows.map(i=>`<tr><td>${i.factura}</td><td>${client(i.clienteId).nombre||""}</td><td>${i.vencimiento}</td><td>${money(i.monto)}</td><td><span class="pill ${status(i).replace(" ","").toLowerCase()}">${status(i)}</span></td><td><button onclick="payInv(${i.id})">Pagada</button><button onclick="delInv(${i.id})">Eliminar</button></td></tr>`).join("")}</table></div></div></div>`}
function addInvoice(){data.invoices.unshift({id:Date.now(),clienteId:+fc.value,factura:ff.value,emision:fe.value,vencimiento:fv.value,monto:+fm.value,estado:"Pendiente",detalle:fd.value});save();invoices()}
function payInv(id){let i=data.invoices.find(x=>x.id===id);i.estado="Pagada";data.incomes.unshift({id:Date.now(),fecha:today(),categoria:"Pago factura",descripcion:i.factura,monto:i.monto});save();invoices()}
function delInv(id){data.invoices=data.invoices.filter(i=>i.id!==id);save();invoices()}
function generic(type,title,cats=[]){let rows=data[type].filter(x=>JSON.stringify(x).toLowerCase().includes(search));document.getElementById("view").innerHTML=`<div class="two"><div class="card form"><h2>${title}</h2><input id="gf" type="date" value="${today()}">${cats.length?`<select id="gc">${cats.map(c=>`<option>${c}</option>`)}</select>`:`<input id="gc" placeholder="Categoría">`}<input id="gd" placeholder="Descripción"><input id="gm" type="number" placeholder="Monto"><button class="primary" onclick="addGeneric('${type}')">Guardar</button></div><div class="card"><h2>Historial ${title}</h2><div class="tableWrap"><table><tr><th>Fecha</th><th>Categoría</th><th>Descripción</th><th>Monto</th><th></th></tr>${rows.map(r=>`<tr><td>${r.fecha}</td><td>${r.categoria}</td><td>${r.descripcion}</td><td>${money(r.monto)}</td><td><button onclick="delGeneric('${type}',${r.id})">Eliminar</button></td></tr>`).join("")}</table></div></div></div>`}
function addGeneric(t){data[t].unshift({id:Date.now(),fecha:gf.value,categoria:gc.value,descripcion:gd.value,monto:+gm.value});save();generic(t,t)}
function delGeneric(t,id){data[t]=data[t].filter(x=>x.id!==id);save();render()}
const income=()=>generic("incomes","Ingresos",["Venta de GPS","Instalación de GPS","Servicio mensual","Pago factura"]);
const expenses=()=>generic("expenses","Egresos",["Pago instalador","Pago IVA","Pago contadora","Sueldos","Cotizaciones","Otro egreso"]);
const debts=()=>generic("debts","Deudas / Facturas por pagar",["Compra de equipos","Pago proveedor","Otro egreso"]);
function alerts(){let rows=data.invoices.filter(i=>status(i)==="Vencida"||status(i)==="Por vencer");document.getElementById("view").innerHTML=`<div class="card"><h2>Cobros / Recordatorios</h2><div class="tableWrap"><table><tr><th>Factura</th><th>Cliente</th><th>Monto</th><th>Estado</th><th>Acciones</th></tr>${rows.map(i=>{let c=client(i.clienteId);let msg=encodeURIComponent(`Estimado cliente, se recuerda su Factura ${i.factura} por la suma de ${money(i.monto)}. Saludos Cordiales GpsRuta`);return`<tr><td>${i.factura}</td><td>${c.nombre||""}</td><td>${money(i.monto)}</td><td>${status(i)}</td><td><a href="https://wa.me/${c.telefono||""}?text=${msg}" target="_blank"><button>WhatsApp</button></a><a href="mailto:${c.email||""}?subject=Recordatorio ${i.factura}&body=${msg}"><button>Correo</button></a></td></tr>`}).join("")}</table></div></div>`}
function commitments(){document.getElementById("view").innerHTML=`<div class="card"><h2>Compromisos de pago</h2><p class="note">Versión ultra liviana: registra compromisos en tareas o notas rápidas.</p></div>`}
function tasks(){document.getElementById("view").innerHTML=`<div class="two"><div class="card form"><h2>Block de notas / tareas</h2><textarea id="taskText" placeholder="Nueva tarea"></textarea><button class="primary" onclick="addTask()">Agregar</button></div><div class="card"><h2>Tareas</h2>${data.tasks.map(t=>`<div class="task ${t.done?'done':''}"><span>${t.text}</span><div><button onclick="togTask(${t.id})">OK</button><button onclick="delTask(${t.id})">X</button></div></div>`).join("")}</div></div>`}
function addTask(){data.tasks.unshift({id:Date.now(),text:taskText.value,done:false});save();tasks()}function togTask(id){let t=data.tasks.find(x=>x.id===id);t.done=!t.done;save();tasks()}function delTask(id){data.tasks=data.tasks.filter(x=>x.id!==id);save();tasks()}
function toggleChat(){chatbox.classList.toggle("hidden")}function ask(){let qv=q.value.toLowerCase(),ans="",pending=data.invoices.filter(i=>status(i)!=="Pagada").sort((a,b)=>a.vencimiento.localeCompare(b.vencimiento));if(qv.includes("antigua")){let f=pending[0];ans=f?`Factura más antigua:\n${f.factura} · ${client(f.clienteId).nombre||""}\nVence: ${f.vencimiento}\nMonto: ${money(f.monto)}`:"No hay pendientes"}else if(qv.includes("debe")||qv.includes("moroso")){ans=critical().slice(0,5).map(c=>`${c.nombre}: ${money(c.monto)} · ${c.pend} pendientes`).join("\n")||"Sin morosos"}else{let k=kpis();ans=`Resumen:\nIngresos ${money(k.ingresos)}\nEgresos ${money(k.egresos)}\nSaldo ${money(k.saldo)}\nPor cobrar ${money(k.porc)}\nVencidas ${k.venc.length}`}msgs.innerHTML+=`<div class="msg user">${q.value}</div><div class="msg ia">${ans}</div>`;q.value=""}
render();save();
</script>
</body>
</html>
